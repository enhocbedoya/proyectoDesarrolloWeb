<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Centro Educativo La Florida</title>
  <link rel="stylesheet" href="style_inicio.css">
</head>
<body>
  <div class="contenedor">
    <div class="encabezado">
      <img src="logo.png" alt="Logo" class="logo">
      <div class="titulos">
        <h1>CENTRO EDUCATIVO LA FLORIDA</h1>
        <h2>SISTEMA DE INFORMACIÓN PARA LA ADMINISTRACIÓN DE NOTAS CON METODOLOGÍA ESCUELA NUEVA</h2>
      </div>
    </div>
    <div class="ingreso">
      <h3>INGRESO DEL USUARIO</h3>
      <div class="campo">
        <label for="usuario">Usuario:</label>
        <input type="text" id="usuario">
      </div>
      <div class="campo">
        <label for="contrasena">Contraseña:</label>
        <input type="password" id="contrasena">
      </div>
      <button type="button">ENTRAR</button>
    </div>
  </div>
</body>
</html>
